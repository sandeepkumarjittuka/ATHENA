services:
  athena-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.13"
    image: athena-backend:dev
    container_name: athena-backend-dev
    environment:
      ATHENA_ENVIRONMENT: development
      ATHENA_DEBUG: "true"
      ATHENA_DATABASE_URL: postgresql+asyncpg://athena:athena@postgres:5432/athena
      ATHENA_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    container_name: athena-postgres-dev
    environment:
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: athena
    ports:
      - "5432:5432"
    volumes:
      - athena-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: athena-redis-dev
    ports:
      - "6379:6379"

volumes:
  athena-postgres-data:
